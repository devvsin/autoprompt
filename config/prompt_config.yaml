# AutoPrompt v2.0 Enterprise

# Models 
scoring_model: "llama-3.1-8b-instant"  
generator_model: "llama-3.1-8b-instant"
temperature: 0.1

# Sleep limits are deprecated since we use asyncio.gather concurrent scheduling 
# and Groq has massively high native rate limits. If we hit limits, Tenacity handles exponentially.
rate_limiting:
  baseline_sleep_seconds: 0
  pipeline_reset_sleep_seconds: 0
  autoprompt_sleep_seconds: 0